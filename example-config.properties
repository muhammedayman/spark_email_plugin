# Spark Email Plugin Configuration Example
# Copy this file to: ~/.spark/email-plugin.properties

# Enable or disable the plugin
enabled=true

# SMTP Server Configuration
# Gmail: smtp.gmail.com
# Outlook: smtp.office365.com
# Yahoo: smtp.mail.yahoo.com
host=smtp.gmail.com

# SMTP Port
# 587 for TLS (recommended)
# 465 for SSL
# 25 for unencrypted (not recommended)
port=587

# Your email username (usually your full email address)
username=your-email@gmail.com

# Your email password or app-specific password
# For Gmail: Use app password from https://myaccount.google.com/apppasswords
password=your-password-here

# Email address to receive chat messages
recipient=recipient@example.com

# Enable SSL/TLS encryption (recommended)
ssl=true
